name: Deploy to EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: rosh-eks-demo-eks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::740055419877:role/rosh-eks-demo-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: rosh-eks-demo-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./eks-terraform-cicd-app/app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Verify cluster access
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Replace image in deployment manifest
        run: sed -i "s|PLACEHOLDER_IMAGE|${{ steps.build-image.outputs.image }}|g" ./eks-terraform-cicd-app/k8s/deployment.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -f ./eks-terraform-cicd-app/k8s/deployment.yaml
          kubectl apply -f ./eks-terraform-cicd-app/k8s/service.yaml
          kubectl rollout status deployment/flask-app